<script>
  document.getElementById('btn-find').addEventListener('click', async function() {
    var btn = this;
    btn.disabled = true;
    btn.innerHTML = 'מחפש התאמות... <span class="material-symbols-outlined">hourglass_empty</span>';

    // Collect routine checkboxes
    var routines = [];
    document.querySelectorAll('input[name="routine"]:checked').forEach(function(cb) {
      routines.push(cb.value);
    });

    // Map activity to energy level
    var activityMap = {
      'couch-potato': 'low',
      'casual': 'low',
      'hiker': 'medium',
      'runner': 'high'
    };

    function mapSize(v) {
      v = parseInt(v);
      if (v === 1) return 'small';
      if (v <= 3) return 'medium';
      return 'large';
    }

    function mapTrain(v) {
      v = parseInt(v);
      if (v <= 2) return 'low';
      if (v === 3) return 'medium';
      return 'high';
    }

    var housingType = sessionStorage.getItem('housing_type') || 'apartment';
    var hasGarden = sessionStorage.getItem('has_garden') === 'true';
    var hasCat = sessionStorage.getItem('has_cat') === 'true';
    var hasDog = sessionStorage.getItem('has_dog') === 'true';
    var hasOtherPets = hasCat || hasDog;
    var whichPets = hasCat && hasDog ? 'cat,dog' : hasCat ? 'cat' : hasDog ? 'dog' : '';
    var livingLocation = (housingType === 'house' && hasGarden) ? 'בית פרטי עם גינה' : (housingType === 'house' ? 'בית פרטי' : 'דירה');

    var formData = {
      why_adopt: sessionStorage.getItem('why_adopt') || '',
      has_kids: sessionStorage.getItem('has_kids') === 'true',
      has_other_pets: hasOtherPets,
      which_pets: whichPets,
      has_yard: hasGarden,
      has_house: housingType === 'house',
      requested_level_energy: activityMap[sessionStorage.getItem('activity')] || 'medium',
      requested_size: mapSize(sessionStorage.getItem('pref_size') || '3'),
      requested_level_of_train: mapTrain(sessionStorage.getItem('pref_train') || '3'),
      dog_living_location: livingLocation,
      primary_care_giver: 'לא צוין',
      daily_routine: routines
    };

    try {
      var response = await fetch('/api/adoption-requests', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(formData)
      });
      var result = await response.json();
      window.location.href = 'results.html?request_id=' + result.request_id;
    } catch (err) {
      console.error('Error submitting:', err);
      window.location.href = 'results.html';
    }
  });
</script>
