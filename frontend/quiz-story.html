<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-[#FFFBF7] flex justify-between items-center h-16 px-5 shadow-[0_4px_20px_rgba(242,140,56,0.08)]">
<button class="text-[#F28C38] active:scale-90 transition-transform hover:opacity-70" onclick="history.back()">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#F28C38]">שאלון Paws Match</h1>
<button class="text-[#F28C38] active:scale-90 transition-transform hover:opacity-70" onclick="window.location.href='welcome.html'">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex-1 mt-16 px-container-margin pb-32 max-w-2xl mx-auto w-full">
<!-- Progress Indicator -->
<div class="py-8 flex flex-col items-center gap-4">
<div class="w-full bg-surface-container-highest h-2 rounded-full overflow-hidden">
<div class="bg-primary-container h-full w-1/5 rounded-full"></div>
</div>
<div class="flex items-center gap-2 text-primary font-label-md">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">pets</span>
<span>שאלה 1 מתוך 5</span>
</div>
</div>
<!-- Content Card Area -->
<div class="bg-surface-container-lowest rounded-[40px] p-8 pill-shadow border border-surface-variant/30 flex flex-col gap-6">
<div class="space-y-3">
<h2 class="font-headline-lg text-on-surface">ספר לנו את הסיפור שלך</h2>
<p class="font-body-lg text-on-surface-variant">למה אתה רוצה לאמץ כלב? זה עוזר לנו למצוא גור שלבו מתאים ללבך.</p>
</div>
<!-- Hero Image for Context -->
<div class="relative w-full h-48 rounded-[32px] overflow-hidden">
<img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKSfzh3qP0WOh8GB09qdfkBEKRdN2hfhhUqnN78J7uqiEpRmeaYJaOYDEu3fangqQYiLxsyJ4c2lDRkmK5rxbuzuDH6SnSiuvM3nfRaTxo0ifIkbe6-TNFUVhSgCDon6Ba_35cwjrgYC_jBJkh5ijVkuMVBI_-2WYfsoQHbuC1SrbOvOgfxDE_s06tmWtU-L_klQOEnACXhwfLhfpNmqr-XOIUc3d-A0cBR99vqbj0durI7brNUvPFT5jWtnOPxQW4xLwJVvGZS0Y" alt="כלב זהוב מניח ראשו על ברך של אדם"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<!-- Input Field -->
<div class="relative group">
<label class="sr-only" for="story-input">הסיפור שלך</label>
<textarea class="w-full h-48 p-6 bg-surface-container rounded-[32px] border-none focus:ring-4 focus:ring-tertiary-container/30 transition-all font-body-md text-on-surface placeholder:text-outline-variant inner-soft-shadow custom-scrollbar resize-none" id="story-input" placeholder="תמיד רציתי חבר לטיולי סוף שבוע..."></textarea>
<div class="absolute bottom-4 left-6 flex items-center gap-2 text-outline text-label-md bg-white/80 backdrop-blur-sm px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px]">edit_note</span>
<span>כותב מהלב</span>
</div>
</div>
<!-- Action Cluster -->
<div class="flex flex-col gap-3 pt-2">
<button id="btn-next" class="w-full h-14 bg-primary-container text-on-primary-container rounded-full font-button flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-lg shadow-primary-container/20 hover:opacity-90">
<span>הצעד הבא</span>
<span class="material-symbols-outlined">arrow_back</span>
</button>
<button id="btn-skip" class="w-full h-14 bg-tertiary-container/10 text-tertiary font-button rounded-full flex items-center justify-center active:scale-[0.98] transition-transform hover:bg-tertiary-container/20">
          דלג
        </button>
</div>
</div>

<div class="bg-secondary-container text-on-secondary-container p-2 rounded-2xl">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div>
<h4 class="font-label-md text-on-secondary-container">טיפ מגניב</h4>
<p class="font-body-md text-on-secondary-fixed-variant mt-1 leading-relaxed text-sm">אם תציין את רמת הפעילות שלך (למשל טיולים או נחת בספה), נוכל להציע את רמת האנרגיה המושלמת!</p>
</div>
</div>
</main>
<script>
  document.getElementById('btn-next').addEventListener('click', function() {
    var val = document.getElementById('story-input').value;
    sessionStorage.setItem('why_adopt', val);
    window.location.href = 'quiz-home.html';
  });
  document.getElementById('btn-skip').addEventListener('click', function() {
    sessionStorage.setItem('why_adopt', '');
    window.location.href = 'quiz-home.html';
  });
</script>
