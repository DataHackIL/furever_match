<span class="material-symbols-outlined text-[120px] text-primary-container" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<script>
  var selectedActivity = sessionStorage.getItem('activity') || '';

  document.querySelectorAll('.activity-card').forEach(function(card) {
    if (card.dataset.value === selectedActivity) {
      card.classList.add('selected');
    }
    card.addEventListener('click', function() {
      document.querySelectorAll('.activity-card').forEach(function(c) { c.classList.remove('selected'); });
      card.classList.add('selected');
      selectedActivity = card.dataset.value;
    });
  });

  document.getElementById('btn-next').addEventListener('click', function() {
    sessionStorage.setItem('activity', selectedActivity);
    window.location.href = 'quiz-home.html';
  });

  document.getElementById('btn-skip').addEventListener('click', function() {
    sessionStorage.setItem('activity', '');
    window.location.href = 'quiz-home.html';
  });
</script>
