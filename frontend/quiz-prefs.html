<!-- Gender Preference -->

                הצעד הבא

</button>

<script>
  var trainLabels  = {1: 'מתחיל', 2: 'בסיסי', 3: 'בינוני', 4: 'מתקדם', 5: 'מקצועי'};
  var ageLabels    = {1: 'גור', 2: 'צעיר', 3: 'בוגר', 4: 'מבוגר'};
  var sizeLabels   = {1: 'קטן', 2: 'קטן-בינוני', 3: 'בינוני', 4: 'גדול', 5: 'גדול מאוד'};
  var energyLabels = {1: 'רגוע', 2: 'פעיל', 3: 'ספורטיבי', 4: 'אינסופי'};

  // Pre-set energy slider from activity chosen on previous page
  // couch-potato→1(low), casual→2(medium), hiker→3(high), runner→4(very_high)
  var activityEnergyMap = {'couch-potato': 1, 'casual': 2, 'hiker': 3, 'runner': 4};
  var activity = sessionStorage.getItem('activity') || '';
  if (activity && activityEnergyMap[activity] && !sessionStorage.getItem('pref_energy')) {
    document.getElementById('energy-slider').value = activityEnergyMap[activity];
    document.getElementById('energy-label').textContent = energyLabels[activityEnergyMap[activity]];
  }

  var dontCare = { train: false, age: false, size: false, energy: false };

  function bindSlider(id, labelId, labels) {
    var slider = document.getElementById(id);
    var label = document.getElementById(labelId);
    slider.addEventListener('input', function() {
      label.textContent = labels[parseInt(slider.value)] || slider.value;
    });
  }

  bindSlider('train-slider', 'train-label', trainLabels);
  bindSlider('age-slider', 'age-label', ageLabels);
  bindSlider('size-slider', 'size-label', sizeLabels);
  bindSlider('energy-slider', 'energy-label', energyLabels);

  document.querySelectorAll('.dont-care-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var key = btn.dataset.key;
      dontCare[key] = !dontCare[key];
      var wrap = document.getElementById(key + '-slider-wrap');
      var label = document.getElementById(key + '-label');
      if (dontCare[key]) {
        btn.classList.add('bg-primary-container', 'text-white', 'border-primary-container');
        btn.classList.remove('text-outline', 'border-outline-variant');
        wrap.style.opacity = '0.35';
        wrap.style.pointerEvents = 'none';
        label.textContent = 'לא משנה לי';
        label.classList.add('bg-outline-variant', 'text-on-surface-variant');
        label.classList.remove('bg-secondary-container', 'text-on-secondary-container');
      } else {
        btn.classList.remove('bg-primary-container', 'text-white', 'border-primary-container');
        btn.classList.add('text-outline', 'border-outline-variant');
        wrap.style.opacity = '';
        wrap.style.pointerEvents = '';
        var labels = { train: trainLabels, age: ageLabels, size: sizeLabels, energy: energyLabels };
        var slider = document.getElementById(key + '-slider');
        label.textContent = labels[key][parseInt(slider.value)];
        label.classList.remove('bg-outline-variant', 'text-on-surface-variant');
        label.classList.add('bg-secondary-container', 'text-on-secondary-container');
      }
    });
  });

  // Gender selection
  var selectedGender = sessionStorage.getItem('pref_gender') || '';
  document.querySelectorAll('.gender-btn').forEach(function(btn) {
    if (btn.dataset.val === selectedGender) {
      btn.classList.add('bg-secondary-container', 'border-primary-container', 'text-primary');
    }
    btn.addEventListener('click', function() {
      document.querySelectorAll('.gender-btn').forEach(function(b) {
        b.classList.remove('bg-secondary-container', 'border-primary-container', 'text-primary');
        b.classList.add('border-outline-variant', 'text-outline');
      });
      btn.classList.add('bg-secondary-container', 'border-primary-container', 'text-primary');
      btn.classList.remove('border-outline-variant', 'text-outline');
      selectedGender = btn.dataset.val;
    });
  });

  document.getElementById('btn-next').addEventListener('click', function() {
    sessionStorage.setItem('pref_train',  dontCare.train  ? '' : document.getElementById('train-slider').value);
    sessionStorage.setItem('pref_age',    dontCare.age    ? '' : document.getElementById('age-slider').value);
    sessionStorage.setItem('pref_size',   dontCare.size   ? '' : document.getElementById('size-slider').value);
    sessionStorage.setItem('pref_energy', dontCare.energy ? '' : document.getElementById('energy-slider').value);
    sessionStorage.setItem('pref_gender', selectedGender);
    window.location.href = 'index.html';
  });
</script>
</body></html>
