<script>
  var selectedChips = {};
  var selectedHousing = null;

  var labelMap = { kids: 'ילדים', cat: 'חתול', dog: 'כלב', garden: 'גינה', other: 'אחר' };

  function updateDropZone() {
    var container = document.getElementById('selected-chips');
    var placeholder = document.getElementById('drop-placeholder');
    container.innerHTML = '';
    var keys = Object.keys(selectedChips).filter(function(k) { return selectedChips[k]; });
    if (keys.length === 0) {
      placeholder.style.display = '';
    } else {
      placeholder.style.display = 'none';
      keys.forEach(function(k) {
        var chip = document.createElement('div');
        chip.className = 'px-4 py-2 bg-secondary-container rounded-full flex items-center gap-2 shadow-sm text-[12px] font-bold text-on-secondary-container';
        chip.textContent = labelMap[k];
        container.appendChild(chip);
      });
    }
  }

  document.querySelectorAll('.chip-item').forEach(function(item) {
    item.addEventListener('click', function() {
      var key = item.dataset.key;
      selectedChips[key] = !selectedChips[key];
      item.classList.toggle('selected', !!selectedChips[key]);
      if (key === 'kids') {
        var kidsWrap = document.getElementById('kids-age-wrap');
        if (selectedChips['kids']) {
          kidsWrap.classList.remove('hidden');
          document.getElementById('kids-age-input').focus();
        } else {
          kidsWrap.classList.add('hidden');
          document.getElementById('kids-age-input').value = '';
        }
      }
      if (key === 'other') {
        var wrap = document.getElementById('other-input-wrap');
        if (selectedChips['other']) {
          wrap.classList.remove('hidden');
          document.getElementById('other-input').focus();
        } else {
          wrap.classList.add('hidden');
          document.getElementById('other-input').value = '';
        }
      }
      updateDropZone();
    });
  });

  document.getElementById('btn-house').addEventListener('click', function() {
    selectedHousing = 'house';
    document.getElementById('btn-house').classList.add('selected');
    document.getElementById('btn-apartment').classList.remove('selected');
  });
  document.getElementById('btn-apartment').addEventListener('click', function() {
    selectedHousing = 'apartment';
    document.getElementById('btn-apartment').classList.add('selected');
    document.getElementById('btn-house').classList.remove('selected');
  });

  document.getElementById('btn-next').addEventListener('click', function() {
    sessionStorage.setItem('has_kids', selectedChips['kids'] ? 'true' : 'false');
    sessionStorage.setItem('kids_age', selectedChips['kids'] ? (document.getElementById('kids-age-input').value.trim() || '') : '');
    sessionStorage.setItem('has_cat', selectedChips['cat'] ? 'true' : 'false');
    sessionStorage.setItem('has_dog', selectedChips['dog'] ? 'true' : 'false');
    sessionStorage.setItem('has_garden', selectedChips['garden'] ? 'true' : 'false');
    sessionStorage.setItem('other_household', selectedChips['other'] ? (document.getElementById('other-input').value.trim() || 'true') : '');
    sessionStorage.setItem('housing_type', selectedHousing || 'apartment');
    window.location.href = 'quiz-prefs.html';
  });

  updateDropZone();
</script>
